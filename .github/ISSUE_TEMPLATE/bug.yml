name: Bug report
description: Report a reproducible, non-sensitive AgentWall product problem.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, access tokens, private source code, raw audit records, or personal data. For a security vulnerability, use **Report a vulnerability** instead.
  - type: input
    id: version
    attributes:
      label: AgentWall version
      placeholder: v0.4.0-beta.2
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Ubuntu 24.04 amd64
        - macOS Apple Silicon
        - Other / unsupported
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use a minimal, redacted example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
