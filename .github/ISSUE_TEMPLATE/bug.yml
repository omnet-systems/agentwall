name: Bug report
description: Report a reproducible, non-sensitive AgentWall product problem.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, access tokens, private source code, raw audit records, or personal data. For a security vulnerability, use **Report a vulnerability** instead.
  - type: input
    id: version
    attributes:
      label: AgentWall version
      placeholder: v0.4.0-beta.2
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Ubuntu 24.04 amd64
        - macOS Apple Silicon
        - Other / unsupported
    validations:
      required: true
  - type: input
    id: os_version_architecture
    attributes:
      label: OS version and architecture
      placeholder: macOS 26.5.1 arm64 or Ubuntu 24.04 amd64
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - GitHub Release DMG
        - GitHub Release Debian package
        - Local development build
        - Other / unsupported
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Protection and activation
        - Requests and approvals
        - Policies
        - Activity and diagnostics
        - Codex integration
        - Claude Code integration
        - Install, update, disable, or uninstall
        - Other / unsupported
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Use a minimal, redacted example.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: safety_confirmation
    attributes:
      label: Sensitive-data confirmation
      options:
        - label: I used redacted or synthetic details and included no credentials, tokens, private source, raw audit records, or personal data.
          required: true
